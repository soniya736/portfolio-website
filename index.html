<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="Container">
        <nav class="sidebar">
            <div>
                <div class="search"><i class="fa-solid fa-magnifying-glass fa-lg" style="color: white"></i></div>
                <div class="home"><i class="fa-solid fa-house" style="color: #e7eaee;"></i></div>
                <div class="clapperboard"><i class="fa-solid fa-clapperboard" style="color: #e6e9f0;"></i></div>
                <div class="tv"><i class="fa-solid fa-tv" style="color: #f5f9ff;"></i></div>
                <div class="arrowup"><i class="fa-solid fa-arrow-trend-up" style="color: #f1f4f8;"></i></div>
                <div class="plus"><i class="fa-solid fa-plus" style="color: #ededee;"></i></div>
                <div class="shuffle"><i class="fa-solid fa-shuffle" style="color: #f4f5f5;"></i></div>
            </div>
        </nav>
        <h1><b>Tamil Movies</b></h1>
        <div class="movie">
        <img src="/media/leo.jpg" alt="leo">
        <img src="/media/vaathi.jpg" alt="vaathi">
        <img src="/media/jailer.jpg" alt="jailer">
        </div>
        <h1><b>HollywoodMovies</b></h1>
        <div class="movie">
        <img src="/media/adamProject.jpg" alt="adam">
        <img src="/media/dark.jpg" alt="dark">
        <img src="/media/glassOnion.jpg" alt="onion">
        </div>
        <h1><b>Hindi Movies</b></h1>
        <div class="movie">
        <img src="/media/animal.jpg" alt="animal">
        <img src="/media/drishyam.jpg" alt="drishyam">
        <img src="/media/shaitaan.jpg" alt="shaitaan">
        </div>
    </div>
</body>
</html>
